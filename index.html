<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1f1b16;
    --ink-soft: #4a443c;
    --paper: #faf7f1;
    --rule: #e0d8c9;
    --accent: #b4571f;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Newsreader', Georgia, serif;
    font-size: 18px;
    line-height: 1.65;
    padding: 4rem 1.5rem 6rem;
  }
  .wrap { max-width: 680px; margin: 0 auto; }
  .eyebrow {
    font-family: 'Fraunces', serif;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 0.72rem;
    color: var(--accent);
    font-weight: 600;
    margin: 0 0 0.75rem;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(2.4rem, 8vw, 3.6rem);
    line-height: 1.05;
    margin: 0 0 0.6rem;
    letter-spacing: -0.015em;
  }
  .lead {
    font-size: 1.25rem;
    color: var(--ink);
    line-height: 1.55;
    margin: 0 0 2.5rem;
    padding-bottom: 2.5rem;
    border-bottom: 1px solid var(--rule);
  }
  p { color: var(--ink-soft); }
  .nav-cards {
    display: grid;
    gap: 1rem;
  }
  .card {
    display: block;
    text-decoration: none;
    color: inherit;
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 1.4rem 1.6rem;
    background: #fff;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .card h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.3rem;
    margin: 0 0 0.3rem;
    color: var(--ink);
  }
  .card p { margin: 0; font-size: 1rem; }
  .card .arrow { color: var(--accent); font-weight: 600; }
  footer {
    margin-top: 3.5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--rule);
    font-size: 0.9rem;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
  <main class="wrap">
    <p class="eyebrow">Triculator</p>
    <h1>Triculator</h1>
    <p class="lead">A simple rule of three (direct proportion) calculator.</p>

    <div class="nav-cards">
      <a class="card" href="support.html">
        <h2>Support</h2>
        <p>Questions, bug reports, or feedback — get in touch. <span class="arrow">&rarr;</span></p>
      </a>
      <a class="card" href="privacy.html">
        <h2>Privacy Policy</h2>
        <p>How Triculator handles your data. <span class="arrow">&rarr;</span></p>
      </a>
    </div>

    <footer>
      &copy; 2026 Triculator. All rights reserved.
    </footer>
  </main>
</body>
</html>
